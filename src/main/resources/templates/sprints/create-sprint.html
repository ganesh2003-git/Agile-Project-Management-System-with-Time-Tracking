<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Sprint - APMST</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --accent-color: #3b82f6;
            --body-bg: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--body-bg);
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            height: 100vh;
            background-color: var(--sidebar-bg);
            color: #f8fafc;
            padding: 24px 16px;
            position: fixed;
            width: 260px;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .sidebar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent-color);
            text-align: center;
            display: block;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--sidebar-hover);
            color: #fff;
            transform: translateX(5px);
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- Pro Form Card --- */
        .form-card {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border-top: 5px solid var(--accent-color);
        }

        .card-header-clean {
            background-color: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            padding: 30px 40px;
            text-align: center;
        }

        .card-header-clean h4 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
        }

        /* --- Input Styling --- */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            background-color: #fcfdfe;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background-color: #fff;
        }

        /* --- Action Buttons --- */
        .btn-pro {
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary-pro {
            background-color: var(--accent-color);
            border: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary-pro:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #64748b;
            border: none;
        }

        .btn-cancel:hover {
            background-color: #e2e8f0;
            color: #1e293b;
        }

        .project-hint {
            background-color: rgba(59, 130, 246, 0.05);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="/dashboard" class="sidebar-brand">APMST PRO</a>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="/dashboard" class="nav-link">📊 Dashboard</a></li>
            <li class="nav-item"><a href="/projects" class="nav-link active">📁 Projects</a></li>
            <li class="nav-item"><a href="/tasks" class="nav-link">✅ My Tasks</a></li>
            <li class="nav-item"><a href="/timelog" class="nav-link">⏱️ Time Log</a></li>
            <li class="nav-item"><a href="/scores/my-score" class="nav-link">🏅 My Score</a></li>
			<li class="nav-item mb-2">
			    <a href="/analytics" class="nav-link text-white">
			        📈 Analytics
			    </a>
			</li>
			
			<!-- Notifications Bell -->
			<li class="nav-item mb-2">
			    <a href="/notifications" class="nav-link text-white">
			        🔔 Notifications
			        <span th:if="${unreadCount > 0}"
			              class="badge bg-danger ms-1"
			              th:text="${unreadCount}">
			        </span>
			    </a>
			</li>
			
            <li class="nav-item"><a href="/scores/leaderboard" class="nav-link">🏆 Leaderboard</a></li>
            <li class="nav-item mt-auto pt-5">
                <a href="/logout" class="nav-link text-danger fw-bold">🚪 Logout</a>
            </li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6 animate__animated animate__zoomIn">
                
                <div class="card form-card">
                    <div class="card-header-clean">
                        <h4>🏃 Create New Sprint</h4>
                        <div class="project-hint">
                            <span class="text-muted">Target Project:</span> 
                            <strong class="text-primary" th:text="${project.name}">Project Name</strong>
                        </div>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/sprints/create/{id}(id=${project.id})}"
                              th:object="${sprint}"
                              method="post">

                            <div class="mb-4">
                                <label class="form-label">Sprint Designation</label>
                                <input type="text" th:field="*{name}" class="form-control" 
                                       placeholder="e.g. Iteration 1 - Core Features" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Sprint Objectives / Goal</label>
                                <textarea th:field="*{goal}" class="form-control" rows="3" 
                                          placeholder="Define what victory looks like for this sprint..."></textarea>
                            </div>

                            <div class="row g-4 mb-5">
                                <div class="col-md-6">
                                    <label class="form-label">Kick-off Date</label>
                                    <input type="date" th:field="*{startDate}" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Target Completion</label>
                                    <input type="date" th:field="*{endDate}" class="form-control" required>
                                </div>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-pro btn-primary-pro w-100 shadow-sm">
                                    🚀 Initialize Sprint
                                </button>
                                <a th:href="@{/sprints/project/{id}(id=${project.id})}" 
                                   class="btn btn-pro btn-cancel w-50 text-center">
                                    Discard
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
                
                <p class="text-center mt-4 text-muted small animate__animated animate__fadeIn animate__delay-1s">
                    Tip: Typical sprints last between 2 and 4 weeks.
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
