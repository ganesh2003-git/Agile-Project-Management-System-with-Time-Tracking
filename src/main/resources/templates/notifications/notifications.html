<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - APMST PRO</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --accent-color: #3b82f6;
            --body-bg: #f8fafc;
        }

        body {
            background-color: var(--body-bg);
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        /* --- Sidebar (Matching your Pro Theme) --- */
        .sidebar {
            height: 100vh;
            background-color: var(--sidebar-bg);
            color: #f8fafc;
            padding: 24px 16px;
            position: fixed;
            width: 260px;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .sidebar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent-color);
            text-align: center;
            display: block;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--sidebar-hover);
            color: #fff;
            transform: translateX(5px);
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 260px;
            padding: 40px;
        }

        /* --- Notifications Style --- */
        .notification-item {
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            transition: transform 0.2s;
        }

        .notification-item:hover {
            transform: translateY(-2px);
        }

        .notification-item.unread {
            border-left: 5px solid #ef4444;
            background: #fff8f8;
        }

        .notification-time {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }

        .btn-action {
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="/dashboard" class="sidebar-brand">APMST PRO</a>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="/dashboard" class="nav-link">📊 Dashboard</a></li>
            <li class="nav-item"><a href="/projects" class="nav-link">📁 Projects</a></li>
            <li class="nav-item"><a href="/tasks" class="nav-link">✅ My Tasks</a></li>
            <li class="nav-item"><a href="/timelog" class="nav-link">⏱️ Time Log</a></li>
            <li class="nav-item"><a href="/scores/my-score" class="nav-link">🏅 My Score</a></li>
            <li class="nav-item"><a href="/notifications" class="nav-link active">🔔 Notifications</a></li>
			<li class="nav-item mb-2">
			    <a href="/analytics" class="nav-link text-white">
			        📈 Analytics
			    </a>
			</li>
            
            <li class="nav-item mt-auto pt-5">
                <a href="/logout" class="nav-link text-danger fw-bold">🚪 Logout</a>
            </li>
        </ul>
    </nav>

    <div class="main-content">

        <div class="d-flex justify-content-between align-items-center mb-5 animate__animated animate__fadeIn">
            <h2 class="fw-bold m-0">🔔 Notifications</h2>
            <a href="/notifications/read-all" class="btn btn-primary btn-action px-4 shadow-sm">
                Mark All as Read
            </a>
        </div>

        <div th:if="${#lists.isEmpty(notifications)}" class="alert alert-light border text-center py-5 rounded-4 animate__animated animate__fadeInUp">
            <div class="fs-1 mb-3">🎉</div>
            <h5 class="fw-bold">All caught up!</h5>
            <p class="text-muted">You have no new notifications at the moment.</p>
        </div>

        <div th:each="notification : ${notifications}" class="animate__animated animate__fadeInUp">
            <div class="notification-item" th:classappend="${!notification.read} ? 'unread' : ''">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="d-flex gap-3">
                        <div class="fs-4">
                            <span th:if="${notification.type == 'TASK_ASSIGNED'}">📋</span>
                            <span th:if="${notification.type == 'TASK_COMPLETED'}">✅</span>
                            <span th:if="${notification.type == 'TASK_REVIEW'}">🔍</span>
                            <span th:if="${notification.type == 'TASK_APPROVED'}">✅</span>
                            <span th:if="${notification.type == 'TASK_REJECTED'}">❌</span>
                        </div>
                        <div>
                            <p class="mb-1 fw-semibold text-dark" th:text="${notification.message}"></p>
                            <div class="notification-time" th:text="${#temporals.format(notification.createdAt, 'dd MMM, hh:mm a')}"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <span th:if="${!notification.read}" class="badge bg-danger rounded-pill px-2 py-1 small me-2">New</span>
                        
                        <a th:if="${notification.link != null}" th:href="${notification.link}" class="btn btn-sm btn-light border btn-action">
                            View
                        </a>
                        <a th:href="@{/notifications/delete/{id}(id=${notification.id})}" class="btn btn-sm btn-outline-danger btn-action">
                            Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
