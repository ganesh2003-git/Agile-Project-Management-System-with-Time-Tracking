<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unexpected Event - APMST PRO</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .error-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            border-top: 5px solid #94a3b8; /* Neutral Slate Gray */
        }
        .icon-box {
            color: #94a3b8;
            font-size: 5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="error-card animate__animated animate__fadeIn">
        <div class="icon-box">📋</div>
        <h2 class="fw-bold text-dark mb-3">Unexpected Event</h2>
        <p class="text-muted mb-4">
            The system encountered an unusual request. This could be due to an expired session or a temporary connection glitch.
        </p>
        
        <div class="d-flex gap-2 justify-content-center">
            <a href="/dashboard" class="btn btn-primary px-5 py-2 rounded-pill fw-bold shadow">
                Go to Dashboard
            </a>
        </div>
        
        <p class="mt-4 text-uppercase small fw-bold text-secondary opacity-50">
            APMST PRO Intelligence System
        </p>
    </div>

</body>
</html>
