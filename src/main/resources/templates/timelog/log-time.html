<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Time - APMST</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
            --accent-color: #3b82f6;
            --body-bg: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--body-bg);
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            height: 100vh;
            background-color: var(--sidebar-bg);
            color: #f8fafc;
            padding: 24px 16px;
            position: fixed;
            width: 260px;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .sidebar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent-color);
            text-align: center;
            display: block;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .nav-link {
            color: #94a3b8;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--sidebar-hover);
            color: #fff;
            transform: translateX(5px);
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Modern Pro Form Card --- */
        .form-card {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
        }

        .card-header-clean {
            background: white;
            border-bottom: 1px solid #f1f5f9;
            padding: 30px;
            text-align: center;
        }

        .card-header-clean h4 {
            font-weight: 700;
            margin-bottom: 5px;
            color: #1e293b;
        }

        .task-hint {
            display: inline-block;
            background: #eff6ff;
            color: #3b82f6;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 10px;
        }

        /* --- Input Styling --- */
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            background-color: #fcfdfe;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background-color: #fff;
        }

        /* --- Action Buttons --- */
        .btn-pro {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-log {
            background-color: var(--accent-color);
            border: none;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-log:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #64748b;
            border: none;
        }

        .btn-cancel:hover {
            background-color: #e2e8f0;
            color: #1e293b;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <a href="/dashboard" class="sidebar-brand">APMST PRO</a>
        <ul class="nav flex-column">
            <li class="nav-item"><a href="/dashboard" class="nav-link">📊 Dashboard</a></li>
            <li class="nav-item"><a href="/projects" class="nav-link">📁 Projects</a></li>
            <li class="nav-item"><a href="/tasks" class="nav-link active">✅ My Tasks</a></li>
            <li class="nav-item"><a href="/timelog" class="nav-link">⏱️ Time Log</a></li>
            <li class="nav-item"><a href="/scores/my-score" class="nav-link">🏅 My Score</a></li>
			<li class="nav-item mb-2">
			    <a href="/analytics" class="nav-link text-white">
			        📈 Analytics
			    </a>
			</li>
			
			<!-- Notifications Bell -->
			<li class="nav-item mb-2">
			    <a href="/notifications" class="nav-link text-white">
			        🔔 Notifications
			        <span th:if="${unreadCount > 0}"
			              class="badge bg-danger ms-1"
			              th:text="${unreadCount}">
			        </span>
			    </a>
			</li>
			
            <li class="nav-item"><a href="/scores/leaderboard" class="nav-link">🏆 Leaderboard</a></li>
            <li class="nav-item mt-auto pt-5">
                <a href="/logout" class="nav-link text-danger fw-bold">🚪 Logout</a>
            </li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="animate__animated animate__zoomIn">
            <div class="card form-card">
                <div class="card-header-clean">
                    <h4>⏱️ Log Working Hours</h4>
                    <div class="task-hint">
                        Target Task: <span th:text="${task.title}">Task Title</span>
                    </div>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/timelog/log/{id}(id=${task.id})}"
                          th:object="${timeLog}"
                          method="post">

                        <div class="mb-4">
                            <label class="form-label">Duration (Hours)</label>
                            <div class="input-group">
                                <input type="number" th:field="*{hoursLogged}" class="form-control"
                                       step="0.5" min="0.5" placeholder="e.g. 2.5" required>
                                <span class="input-group-text bg-light border-start-0" style="border-radius: 0 12px 12px 0;">hrs</span>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label class="form-label">Contribution Notes</label>
                            <textarea th:field="*{workDescription}" class="form-control" rows="4" 
                                      placeholder="Briefly describe the progress made during this session..."></textarea>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-pro btn-log">
                                🚀 Record Effort
                            </button>
                            <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-pro btn-cancel">
                                Discard
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            
            <p class="text-center mt-4 text-muted small animate__animated animate__fadeIn animate__delay-1s">
                Accurate time logging helps in calculating your team performance score.
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
