<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Server Error - APMST PRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .error-card { background: white; padding: 60px; border-radius: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; max-width: 550px; }
        .icon-box { color: #f59e0b; font-size: 5rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="error-card animate__animated animate__headShake">
        <div class="icon-box">🛠️</div>
        <h2 class="fw-bold text-dark mb-3">Technical Hiccup</h2>
        <p class="text-muted mb-4">Something went wrong on our end. Our engineering team has been notified. Please try refreshing or return to the dashboard.</p>
        <div class="d-flex gap-2 justify-content-center">
            <button onclick="location.reload()" class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-bold">Retry</button>
            <a href="/dashboard" class="btn btn-primary px-4 py-2 rounded-pill fw-bold">Dashboard</a>
        </div>
    </div>
</body>
</html>
